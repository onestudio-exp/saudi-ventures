version: "2"
sql:
  - engine: "postgresql"
    schema: "internal/db/schema"
    queries: "internal/db/queries"
    gen:
      go:
        package: "db"
        out: "internal/db/gen"
        emit_json_tags: true
        emit_db_tags: true
        emit_pointers_for_null_types: true
        rename:
          url: "URL"
          image_url: "ImageURL"
          logo_url: "LogoURL"
        # The postgresql engine maps nullable columns to sql.Null* by default, but
        # the resource transformers (internal/resources/*) consume *string / *int64.
        # Force pointers for nullable text/bigint to preserve that contract.
        overrides:
          - db_type: "text"
            nullable: true
            go_type:
              type: "string"
              pointer: true
          - db_type: "pg_catalog.int8"
            nullable: true
            go_type:
              type: "int64"
              pointer: true
          - db_type: "timestamptz"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          - db_type: "jsonb"
            go_type: "string"
