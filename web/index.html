<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saudi Ventures Intelligence</title>
    <!-- Distinctive type: Fraunces (editorial display) + IBM Plex Sans/Mono/Arabic (refined body + data) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- No-flash theme: apply the persisted choice (default dark) before first paint -->
    <script>
      (function () {
        try {
          var k = "togo-theme", t = localStorage.getItem(k);
          if (!t) { t = "dark"; localStorage.setItem(k, t); }
          var d = document.documentElement;
          d.setAttribute("data-theme", t);
          d.classList.toggle("dark", t !== "light");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
